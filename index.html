<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaForge — Luxury Pool Configurator</title>
<style>
/* ============================================================
   AQUAFORGE — PREMIUM POOL CONFIGURATOR DESIGN SYSTEM
   ============================================================ */
:root {
  --bg-deep: #0a0a0f;
  --bg-surface: #12121a;
  --bg-elevated: #1a1a26;
  --bg-overlay: #222233;
  --border-subtle: rgba(255,255,255,0.06);
  --border-active: rgba(255,255,255,0.12);
  --text-primary: #f0f0f5;
  --text-secondary: #9898b0;
  --text-muted: #606078;
  --accent: #06b6d4;
  --accent-glow: rgba(6,182,212,0.35);
  --accent-warm: #e8a850;
  --success: #22c55e;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --shadow-card: 0 4px 24px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.5);
  --shadow-elevated: 0 8px 40px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.4);
  --font-display: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --ease-out-expo: cubic-bezier(0.16,1,0.3,1);
  --ease-out-back: cubic-bezier(0.34,1.56,0.64,1);
}
@font-face{font-family:'Inter';font-style:normal;font-weight:300 800;font-display:swap;src:url(https://fonts.gstatic.com/s/inter/v18/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa25L7W0Q5n-wU.woff2) format('woff2')}
@font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;font-display:swap;src:url(https://fonts.gstatic.com/s/jetbrainsmono/v20/tDbY2o-flEEny0FZhsfKu5WU4zr3E_BX0PnT8RD8yKxjPQ.woff2) format('woff2')}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-display);font-weight:400;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
#app{display:grid;grid-template-columns:420px 1fr;grid-template-rows:1fr auto;width:100%;height:100vh;position:relative}
#canvas-container{grid-column:2;grid-row:1/3;position:relative;overflow:hidden;background:radial-gradient(ellipse at center, #141420 0%, #0a0a0f 70%)}
#canvas-container canvas{display:block}
#canvas-container::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,0.15) 100%);z-index:2}
#sidebar{grid-column:1;grid-row:1;display:flex;flex-direction:column;background:var(--bg-surface);border-right:1px solid var(--border-subtle);overflow-y:auto;overflow-x:hidden;z-index:10;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-track{background:transparent}
#sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}
#summary-bar{grid-column:1;grid-row:2;background:var(--bg-elevated);border-top:1px solid var(--border-subtle);border-right:1px solid var(--border-subtle);padding:20px 24px;z-index:10;display:flex;flex-direction:column;gap:12px}
.sidebar-header{padding:24px 24px 16px;border-bottom:1px solid var(--border-subtle);position:sticky;top:0;background:var(--bg-surface);z-index:5;backdrop-filter:blur(20px)}
.sidebar-header .logo{font-size:22px;font-weight:700;letter-spacing:-0.03em;background:linear-gradient(135deg, #06b6d4, #22d3ee, #67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-header .subtitle{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;font-weight:500}
.section{margin:0;border-bottom:1px solid var(--border-subtle)}
.section-header{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background 0.2s}
.section-header:hover{background:rgba(255,255,255,0.02)}
.section-header .section-index{width:28px;height:28px;border-radius:8px;background:var(--bg-overlay);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text-secondary);margin-right:12px;flex-shrink:0}
.section-header .section-title{font-size:14px;font-weight:600;color:var(--text-primary);flex:1}
.section-header .section-chevron{width:20px;height:20px;color:var(--text-muted);transition:transform 0.3s var(--ease-out-expo)}
.section.collapsed .section-chevron{transform:rotate(-90deg)}
.section-body{max-height:800px;overflow:hidden;transition:max-height 0.4s var(--ease-out-expo), opacity 0.3s, padding 0.3s;opacity:1;padding:0 16px 16px}
.section.collapsed .section-body{max-height:0;opacity:0;padding:0 16px}
.option-card{margin-bottom:8px;border-radius:var(--radius-md);border:1.5px solid var(--border-subtle);padding:14px 16px;cursor:pointer;transition:all 0.25s var(--ease-out-expo);position:relative;background:var(--bg-elevated);overflow:hidden}
.option-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.option-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent), 0 0 30px var(--accent-glow)}
.option-card.active::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left, rgba(6,182,212,0.08), transparent 70%);pointer-events:none}
.option-card .option-header{display:flex;align-items:flex-start;gap:12px}
.option-card .color-swatch{width:36px;height:36px;border-radius:var(--radius-sm);flex-shrink:0;border:1px solid rgba(255,255,255,0.1);position:relative;overflow:hidden}
.option-card.active .color-swatch{box-shadow:0 0 12px var(--accent-glow)}
.option-card .option-info{flex:1;min-width:0}
.option-card .option-name{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:2px}
.option-card .option-desc{font-size:11px;color:var(--text-muted);line-height:1.4}
.option-card .option-price{font-size:15px;font-weight:700;color:var(--accent-warm);margin-top:6px;font-variant-numeric:tabular-nums}
.option-card .option-price span{font-size:10px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em}
.option-card .active-indicator{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:0;transform:scale(0);transition:all 0.3s var(--ease-out-back)}
.option-card.active .active-indicator{opacity:1;transform:scale(1)}
.summary-total{display:flex;align-items:baseline;justify-content:space-between}
.summary-total .label{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em}
.summary-total .amount{font-size:32px;font-weight:700;color:var(--text-primary);letter-spacing:-0.03em;font-variant-numeric:tabular-nums;transition:all 0.3s var(--ease-out-expo)}
.summary-total .amount.updating{color:var(--accent)}
.summary-details{display:flex;flex-direction:column;gap:6px}
.summary-line{display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary)}
.summary-line .val{font-weight:500;font-variant-numeric:tabular-nums;color:var(--text-primary)}
.viewport-overlay{position:absolute;top:16px;right:16px;z-index:5;display:flex;flex-direction:column;gap:8px}
.viewport-badge{padding:8px 14px;border-radius:var(--radius-sm);background:rgba(18,18,26,0.85);backdrop-filter:blur(12px);border:1px solid var(--border-subtle);font-size:11px;color:var(--text-secondary);font-weight:500;display:flex;align-items:center;gap:6px}
.viewport-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.loading-screen{position:fixed;inset:0;z-index:100;background:var(--bg-deep);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s,visibility 0.5s}
.loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-ring{width:48px;height:48px;border:2px solid rgba(255,255,255,0.08);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text-muted);letter-spacing:0.05em}
@media(max-width:900px){#app{grid-template-columns:100%;grid-template-rows:auto 1fr auto}#sidebar{grid-column:1;grid-row:1;max-height:45vh}#canvas-container{grid-column:1;grid-row:2}#summary-bar{grid-column:1;grid-row:3}}
</style>
</head>

<div class="loading-screen" id="loading"><div class="loading-ring"></div><div class="loading-text">INITIALIZING CONFIGURATOR</div></div>

// ============================================================
// STATE MANAGEMENT
// ============================================================
const state = {
  selections: {},
  dims: { pool_length: 40, pool_width: 20, pool_depth_avg: 5 },
  initialized: false
};

// Initialize defaults
CONFIG.asset.sections.forEach(s => {
  state.selections[s.id] = s.default_option_id;
});

function getSelectedOption(sectionId) {
  const section = CONFIG.asset.sections.find(s => s.id === sectionId);
  if (!section) return null;
  return section.options.find(o => o.id === state.selections[sectionId]);
}

function calculateCost() {
  let total = 0;
  const lines = [];

  CONFIG.asset.sections.forEach(section => {
    const opt = getSelectedOption(section.id);
    if (!opt) return;

    let cost = 0;
    let label = '';

    if (opt.pricing.method === 'LS') {
      cost = opt.pricing.base_cost;
      label = `${opt.name}`;
    } else if (opt.pricing.method === 'SF') {
      const patioArea = (state.dims.pool_length + 8) * (state.dims.pool_width + 8) - state.dims.pool_length * state.dims.pool_width;
      cost = opt.pricing.base_rate * Math.max(patioArea, 200);
      label = `${opt.name} (${Math.round(patioArea)} SF × ${opt.pricing.base_rate.toFixed(2)})`;
    }

    total += cost;
    lines.push({ label, cost });
  });

  return { total, lines };
}

function seededRandom(seed) {
  let s = seed;
  return function() { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

function generatePlasterTexture(size, profile) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const rng = seededRandom(42);

  // Base fill
  const [r, g, b] = profile.base_color;
  ctx.fillStyle = `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
  ctx.fillRect(0, 0, size, size);

  // Mottling via semi-transparent circles
  const numMottles = Math.floor(size * size * profile.mottle_density * 0.0001);
  for (let i = 0; i < numMottles; i++) {
    const x = rng() * size;
    const y = rng() * size;
    const rad = profile.mottle_size_range[0] + rng() * (profile.mottle_size_range[1] - profile.mottle_size_range[0]);
    const alpha = (rng() - 0.5) * profile.amplitude_scale * 2;
    const v = 0.5 + alpha;
    ctx.fillStyle = `rgba(${Math.round(v*255)},${Math.round(v*255)},${Math.round(v*255)},${Math.abs(alpha)*3})`;
    ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fill();
  }

  // Micro-pitting
  const numPits = Math.floor(size * size * profile.micro_pitting_density * 0.0001);
  for (let i = 0; i < numPits; i++) {
    const x = rng() * size;
    const y = rng() * size;
    const rad = 1 + rng() * 3;
    ctx.fillStyle = `rgba(0,0,0,${0.08 + rng()*0.06})`;
    ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fill();
  }

  return canvas;
}

function generateVinylMosaicTexture(size, profile) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const rng = seededRandom(77);

  const [cols, rows] = profile.mosaic_tile_grid;
  const tileW = size / cols;
  const tileH = size / rows;
  const gw = profile.grout_width_px || 2;

  // Grout base
  const [gr, gg, gb] = profile.grout_color;
  ctx.fillStyle = `rgb(${Math.round(gr*255)},${Math.round(gg*255)},${Math.round(gb*255)})`;
  ctx.fillRect(0, 0, size, size);

  // Tiles
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const x = col * tileW + gw;
      const y = row * tileH + gw;
      const w = tileW - gw * 2;
      const h = tileH - gw * 2;

      const [br, bg, bb] = profile.base_color;
      const v = profile.color_variance_per_tile || 0.06;
      const cr = br + (rng() - 0.5) * v * 2;
      const cg = bg + (rng() - 0.5) * v * 2;
      const cb = bb + (rng() - 0.5) * v * 2;

      ctx.fillStyle = `rgb(${Math.round(Math.max(0,Math.min(1,cr))*255)},${Math.round(Math.max(0,Math.min(1,cg))*255)},${Math.round(Math.max(0,Math.min(1,cb))*255)})`;
      ctx.fillRect(x, y, w, h);

      // Subtle tile highlight
      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      grad.addColorStop(0, 'rgba(255,255,255,0.06)');
      grad.addColorStop(0.5, 'rgba(255,255,255,0.0)');
      grad.addColorStop(1, 'rgba(0,0,0,0.04)');
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, w, h);
    }
  }

  return canvas;
}

function generatePaverTexture(size, profile) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const rng = seededRandom(123);

  const cols = profile.grid_cols || 22;
  const rows = profile.grid_rows || 34;
  const pw = size / cols;
  const ph = size / rows;
  const jw = profile.joint_width_px || 4;
  const colors = profile.paver_colors;

  // Joint base
  const [jr, jg, jb] = profile.joint_color;
  ctx.fillStyle = `rgb(${Math.round(jr*255)},${Math.round(jg*255)},${Math.round(jb*255)})`;
  ctx.fillRect(0, 0, size, size);

  // Pavers in running bond
  for (let row = 0; row < rows; row++) {
    const offset = (row % 2 === 1) ? pw * 0.5 : 0;
    for (let col = 0; col < cols + 1; col++) {
      const x = col * pw - pw * 0.5 + offset + jw;
      const y = row * ph + jw;
      const w = pw - jw * 2;
      const h = ph - jw * 2;

      if (x + w < 0 || x > size) continue;

      const ci = Math.floor(rng() * colors.length);
      const [cr, cg, cb] = colors[ci];
      const v = (rng() - 0.5) * 0.03;

      ctx.fillStyle = `rgb(${Math.round((cr+v)*255)},${Math.round((cg+v)*255)},${Math.round((cb+v)*255)})`;
      ctx.fillRect(x, y, w, h);

      // Chamfer edges
      const ec = profile.edge_chamfer_width_px;
      if (ec) {
        ctx.fillStyle = `rgba(0,0,0,0.08)`;
        ctx.fillRect(x, y, ec, h);
        ctx.fillRect(x + w - ec, y, ec, h);
        ctx.fillRect(x, y, w, ec);
        ctx.fillRect(x, y + h - ec, w, ec);
      }
    }
  }

  return canvas;
}

function generateTravertineTexture(size, profile) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const rng = seededRandom(456);

  // Base fill
  const [br, bg, bb] = profile.base_color;
  ctx.fillStyle = `rgb(${Math.round(br*255)},${Math.round(bg*255)},${Math.round(bb*255)})`;
  ctx.fillRect(0, 0, size, size);

  // Tonal variation noise
  for (let i = 0; i < 800; i++) {
    const x = rng() * size;
    const y = rng() * size;
    const rad = 6 + rng() * 30;
    const v = (rng() - 0.5) * profile.tonal_variation_amplitude * 2;
    ctx.fillStyle = `rgba(${Math.round((br+v)*255)},${Math.round((bg+v)*255)},${Math.round((bb+v)*255)},0.3)`;
    ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fill();
  }

  // Primary veins
  const [vr, vg, vb] = profile.vein_color;
  ctx.strokeStyle = `rgba(${Math.round(vr*255)},${Math.round(vg*255)},${Math.round(vb*255)},${profile.vein_opacity})`;
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 20; i++) {
    ctx.beginPath();
    const sx = rng() * size;
    const sy = rng() * size;
    ctx.moveTo(sx, sy);
    let cx = sx, cy = sy;
    for (let j = 0; j < 12; j++) {
      cx += (rng() - 0.5) * 180;
      cy += (rng() - 0.5) * 120;
      ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }

  // Secondary veins
  const [svr, svg, svb] = profile.secondary_vein_color;
  ctx.strokeStyle = `rgba(${Math.round(svr*255)},${Math.round(svg*255)},${Math.round(svb*255)},${profile.secondary_vein_opacity})`;
  ctx.lineWidth = 0.8;
  for (let i = 0; i < 30; i++) {
    ctx.beginPath();
    const sx = rng() * size;
    const sy = rng() * size;
    ctx.moveTo(sx, sy);
    let cx = sx, cy = sy;
    for (let j = 0; j < 8; j++) {
      cx += (rng() - 0.5) * 100;
      cy += (rng() - 0.5) * 80;
      ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }

  // Void fills
  const [vfr, vfg, vfb] = profile.void_fill_color;
  const numVoids = Math.floor(size * size * profile.void_fill_density * 0.0001);
  for (let i = 0; i < numVoids; i++) {
    const x = rng() * size;
    const y = rng() * size;
    const rad = profile.void_fill_size_range[0] + rng() * (profile.void_fill_size_range[1] - profile.void_fill_size_range[0]);
    ctx.fillStyle = `rgba(${Math.round(vfr*255)},${Math.round(vfg*255)},${Math.round(vfb*255)},0.7)`;
    ctx.beginPath();
    ctx.ellipse(x, y, rad, rad * (0.5 + rng() * 0.5), rng() * Math.PI * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  return canvas;
}

function generateNormalMap(baseCanvas, strength, profile) {
  const canvas = document.createElement('canvas');
  canvas.width = baseCanvas.width;
  canvas.height = baseCanvas.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(baseCanvas, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  const w = canvas.width, h = canvas.height;

  // Simple Sobel-like normal generation
  const gray = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) gray[i] = (data[i*4] + data[i*4+1] + data[i*4+2]) / (3 * 255);

  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const idx = y * w + x;
      const dx = (gray[idx+1] - gray[idx-1]) * strength * 5;
      const dy = (gray[idx+w] - gray[idx-w]) * strength * 5;
      const nx = dx;
      const ny = dy;
      const nz = 1.0 / Math.sqrt(nx*nx + ny*ny + 1);

      data[idx*4] = Math.round((nx * nz * 0.5 + 0.5) * 255);
      data[idx*4+1] = Math.round((ny * nz * 0.5 + 0.5) * 255);
      data[idx*4+2] = Math.round((nz * 0.5 + 0.5) * 255);
      data[idx*4+3] = 255;
    }
  }

  ctx.putImageData(imageData, 0, 0);
  return canvas;
}

function generateRoughnessMap(size, baseRoughness, variance) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const rng = seededRandom(999);

  const val = Math.round(baseRoughness * 255);
  ctx.fillStyle = `rgb(${val},${val},${val})`;
  ctx.fillRect(0, 0, size, size);

  for (let i = 0; i < 400; i++) {
    const x = rng() * size;
    const y = rng() * size;
    const rad = 4 + rng() * 25;
    const v = baseRoughness + (rng() - 0.5) * variance * 2;
    const cv = Math.round(Math.max(0, Math.min(1, v)) * 255);
    ctx.fillStyle = `rgba(${cv},${cv},${cv},0.4)`;
    ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fill();
  }

  return canvas;
}

function buildMaterial(option, texSize) {
  const gt = option.graphics_target;
  const size = texSize || 512;

  if (gt.material_type === 'ShaderMaterial') {
    return { type: 'shader', color: gt.color.srgb, ...gt };
  }

  // Generate procedural textures
  let albedoCanvas;
  const mapProfile = gt.textures.map.profile;

  if (gt.textures.map.generator === 'tileable_architectural_plaster') {
    albedoCanvas = generatePlasterTexture(size, mapProfile);
  } else if (gt.textures.map.generator === 'tileable_mosaic_waterliner') {
    albedoCanvas = generateVinylMosaicTexture(size, mapProfile);
  } else if (gt.textures.map.generator === 'tileable_concrete_paver_grid') {
    albedoCanvas = generatePaverTexture(size, mapProfile);
  } else if (gt.textures.map.generator === 'tileable_travertine_stone') {
    albedoCanvas = generateTravertineTexture(size, mapProfile);
  } else {
    albedoCanvas = generatePlasterTexture(size, mapProfile);
  }

  const normalCanvas = generateNormalMap(albedoCanvas, gt.textures.normalMap?.profile?.strength || 0.5, gt.textures.normalMap?.profile || {});
  const roughnessCanvas = generateRoughnessMap(size, gt.pbr_properties.roughness, gt.textures.roughnessMap?.profile?.roughness_variance || 0.1);

  const albedoTex = new THREE.CanvasTexture(albedoCanvas);
  const normalTex = new THREE.CanvasTexture(normalCanvas);
  const roughnessTex = new THREE.CanvasTexture(roughnessCanvas);

  [albedoTex, normalTex, roughnessTex].forEach(tex => {
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.colorSpace = tex === albedoTex ? THREE.SRGBColorSpace : THREE.LinearSRGBColorSpace;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = true;
  });

  const repeatVal = gt.textures.map.repeat || [1, 1];
  albedoTex.repeat.set(repeatVal[0], repeatVal[1]);
  normalTex.repeat.set(repeatVal[0], repeatVal[1]);
  roughnessTex.repeat.set(repeatVal[0], repeatVal[1]);

  const mat = new THREE.MeshStandardMaterial({
    map: albedoTex,
    normalMap: normalTex,
    roughnessMap: roughnessTex,
    roughness: gt.pbr_properties.roughness,
    metalness: gt.pbr_properties.metalness,
    color: new THREE.Color().fromArray(gt.color.srgb),
  });

  // Store for cleanup
  mat.userData = { albedoTex, normalTex, roughnessTex };

  return { type: 'standard', material: mat };
}

});

const poolGroup = new THREE.Group();
scene.add(poolGroup);

const shellMeshes = [];
let waterMesh = null;
const patioMeshes = {};

function createPoolShell(length, width, depth) {
  // Clear existing
  while (poolGroup.children.length > 0) poolGroup.remove(poolGroup.children[0]);
  shellMeshes.length = 0;
  waterMesh = null;
  Object.keys(patioMeshes).forEach(k => delete patioMeshes[k]);

  const L = length * 0.3048; // ft to meters
  const W = width * 0.3048;
  const D = depth * 0.3048;
  const wallThickness = 0.35;
  const floorThickness = 0.3;

  // Outer shell box
  const outerGeo = new THREE.BoxGeometry(L + wallThickness * 2, D + floorThickness, W + wallThickness * 2);
  const outerMesh = new THREE.Mesh(outerGeo, new THREE.MeshStandardMaterial({ visible: false }));
  outerMesh.position.y = -(D + floorThickness) / 2;
  outerMesh.castShadow = true;
  outerMesh.receiveShadow = true;
  poolGroup.add(outerMesh);
  shellMeshes.push(outerMesh);

  // Floor
  const floorGeo = new THREE.BoxGeometry(L, floorThickness, W);
  const floorMesh = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.6 }));
  floorMesh.position.y = -D;
  floorMesh.receiveShadow = true;
  poolGroup.add(floorMesh);
  shellMeshes.push(floorMesh);

  // Walls — 4 sides
  const wallLongGeo = new THREE.BoxGeometry(L, D, wallThickness);
  const wallShortGeo = new THREE.BoxGeometry(wallThickness, D, W);

  [-1, 1].forEach(sign => {
    const wl = new THREE.Mesh(wallLongGeo, new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.6 }));
    wl.position.set(0, -D / 2, sign * (W / 2 + wallThickness / 2));
    wl.receiveShadow = true;
    wl.castShadow = true;
    poolGroup.add(wl);
    shellMeshes.push(wl);

    const ws = new THREE.Mesh(wallShortGeo, new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.6 }));
    ws.position.set(sign * (L / 2 + wallThickness / 2), -D / 2, 0);
    ws.receiveShadow = true;
    ws.castShadow = true;
    poolGroup.add(ws);
    shellMeshes.push(ws);
  });

  // Coping (top edge)
  const copingGeo = new THREE.BoxGeometry(L + wallThickness * 2 + 0.3, 0.12, W + wallThickness * 2 + 0.3);
  const copingMesh = new THREE.Mesh(copingGeo, new THREE.MeshStandardMaterial({ color: 0xd4d0cc, roughness: 0.3, metalness: 0.05 }));
  copingMesh.position.y = 0.06;
  copingMesh.castShadow = true;
  copingMesh.receiveShadow = true;
  poolGroup.add(copingMesh);
  shellMeshes.push(copingMesh);

  // Patio deck
  const patioMargin = 2.5;
  const patioL = L + wallThickness * 2 + patioMargin * 2;
  const patioW = W + wallThickness * 2 + patioMargin * 2;
  const patioGeo = new THREE.PlaneGeometry(patioL, patioW);
  const patioMesh = new THREE.Mesh(patioGeo, new THREE.MeshStandardMaterial({ color: 0xa8a29e, roughness: 0.65 }));
  patioMesh.rotation.x = -Math.PI / 2;
  patioMesh.position.y = -0.01;
  patioMesh.receiveShadow = true;
  poolGroup.add(patioMesh);
  patioMeshes.deck = patioMesh;

  // Water surface
  const waterGeo = new THREE.PlaneGeometry(L - 0.15, W - 0.15);
  const waterOpt = getSelectedOption('section_water_profile');
  const wgt = waterOpt?.graphics_target;
  const waterUniforms = {
    uTime: { value: 0 },
    uColor: { value: new THREE.Color().setHex(wgt?.color?.hex?.replace('#','') || '0x06b6d4') },
    uOpacity: { value: wgt?.transparency?.opacity || 0.6 },
    uDistortionScale: { value: wgt?.water_animation?.distortionScale || 4.0 },
    uWaveSpeed: { value: new THREE.Vector2(wgt?.water_animation?.wave_speed_vector?.[0] || 0.08, wgt?.water_animation?.wave_speed_vector?.[1] || 0.12) },
    uWaveAmpA: { value: wgt?.water_animation?.wave_amplitude_a || 0.18 },
    uWaveAmpB: { value: wgt?.water_animation?.wave_amplitude_b || 0.09 },
    uWaveFreqA: { value: wgt?.water_animation?.wave_frequency_a || 2.3 },
    uWaveFreqB: { value: wgt?.water_animation?.wave_frequency_b || 5.7 },
    uWaveDirA: { value: new THREE.Vector2(wgt?.water_animation?.wave_direction_a?.[0] || 0.6, wgt?.water_animation?.wave_direction_a?.[1] || 0.8) },
    uWaveDirB: { value: new THREE.Vector2(wgt?.water_animation?.wave_direction_b?.[0] || -0.4, wgt?.water_animation?.wave_direction_b?.[1] || 0.9) },
    uChoppiness: { value: wgt?.water_animation?.choppiness || 0.35 },
    uCameraPos: { value: new THREE.Vector3() },
    uRoughness: { value: wgt?.pbr_properties?.roughness || 0.01 },
  };

  const waterMat = new THREE.ShaderMaterial({
    uniforms: waterUniforms,
    vertexShader: `
      varying vec3 vWorldPos;
      varying vec3 vNormal;
      varying vec2 vUv;
      varying vec3 vViewDir;
      uniform float uTime;
      uniform vec2 uWaveSpeed;
      uniform float uWaveAmpA;
      uniform float uWaveAmpB;
      uniform float uWaveFreqA;
      uniform float uWaveFreqB;
      uniform vec2 uWaveDirA;
      uniform vec2 uWaveDirB;
      uniform float uChoppiness;

      void main() {
        vec3 pos = position;
        float waveA = sin(pos.x * uWaveFreqA + uTime * uWaveSpeed.x) * cos(pos.z * uWaveFreqA + uTime * uWaveSpeed.y) * uWaveAmpA;
        float waveB = sin(pos.x * uWaveFreqB * uWaveDirB.x + pos.z * uWaveFreqB * uWaveDirB.y + uTime * uWaveSpeed.y * 1.4) * uWaveAmpB;
        float wave = waveA + waveB;
        pos.y += wave;
        // Choppy displacement
        pos.x += cos(pos.z * uWaveFreqA * 1.8 + uTime * uWaveSpeed.x * 1.3) * uChoppiness * uWaveAmpA;
        pos.z += sin(pos.x * uWaveFreqB * 1.6 + uTime * uWaveSpeed.y * 1.2) * uChoppiness * uWaveAmpB;
        vec4 worldPos = modelMatrix * vec4(pos, 1.0);
        vWorldPos = worldPos.xyz;
        vNormal = normalize(mat3(modelMatrix) * normalize(vec3(
          -cos(pos.x * uWaveFreqA + uTime * uWaveSpeed.x) * uWaveFreqA * uWaveAmpA
          - cos(pos.x * uWaveFreqB * uWaveDirB.x + pos.z * uWaveFreqB * uWaveDirB.y + uTime * uWaveSpeed.y * 1.4) * uWaveFreqB * uWaveDirB.x * uWaveAmpB,
          1.0,
          -cos(pos.z * uWaveFreqA + uTime * uWaveSpeed.y) * uWaveFreqA * uWaveAmpA
          - cos(pos.x * uWaveFreqB * uWaveDirB.x + pos.z * uWaveFreqB * uWaveDirB.y + uTime * uWaveSpeed.y * 1.4) * uWaveFreqB * uWaveDirB.y * uWaveAmpB
        )));
        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
        vViewDir = normalize(-mvPos.xyz);
        vUv = uv;
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying vec3 vWorldPos;
      varying vec3 vNormal;
      varying vec2 vUv;
      varying vec3 vViewDir;
      uniform float uTime;
      uniform vec3 uColor;
      uniform float uOpacity;
      uniform float uDistortionScale;
      uniform float uRoughness;
      uniform vec3 uCameraPos;

      void main() {
        vec3 N = normalize(vNormal);
        vec3 V = normalize(vViewDir);

        // Fresnel
        float fresnel = pow(1.0 - abs(dot(N, V)), 3.5);
        fresnel = mix(0.15, 0.75, fresnel);

        // Caustic-like pattern
        vec2 causticUV = vWorldPos.xz * uDistortionScale * 0.5;
        float caustic = sin(causticUV.x * 12.0 + uTime * 0.8) * sin(causticUV.y * 12.0 + uTime * 0.6);
        caustic += sin(causticUV.x * 8.0 - uTime * 0.5) * sin(causticUV.y * 10.0 + uTime * 0.4);
        caustic = caustic * 0.5 + 0.5;
        caustic = smoothstep(0.35, 0.65, caustic);

        // Deep vs shallow coloring
        float depth = vWorldPos.y * 2.0;
        vec3 shallowColor = uColor * 1.2;
        vec3 deepColor = uColor * 0.25;
        vec3 waterColor = mix(shallowColor, deepColor, smoothstep(-0.5, -2.0, depth));

        // Specular
        vec3 H = normalize(V + vec3(0.0, 1.0, 0.0));
        float spec = pow(max(dot(N, H), 0.0), 1.0 / (uRoughness * uRoughness + 0.001)) * (1.0 - uRoughness);

        vec3 color = waterColor;
        color += vec3(0.1, 0.2, 0.3) * caustic * 0.25;
        color += vec3(1.0, 0.95, 0.8) * spec * (0.6 + fresnel * 0.4);
        color = mix(color, vec3(0.9, 0.95, 1.0), fresnel);

        gl_FragColor = vec4(color, uOpacity);
      }
    `,
    transparent: true,
    depthWrite: false,
  });

  waterMesh = new THREE.Mesh(waterGeo, waterMat);
  waterMesh.position.y = 0.02;
  waterMesh.renderOrder = 1;
  waterMesh.userData = { uniforms: waterUniforms };
  poolGroup.add(waterMesh);

  // Position group
  poolGroup.position.set(0, 0, 0);
}

// Initial build
createPoolShell(state.dims.pool_length, state.dims.pool_width, state.dims.pool_depth_avg);
applyShellMaterial();

// ============================================================
// MATERIAL APPLICATION
// ============================================================
function disposeMaterial(mat) {
  if (!mat || !mat.userData) return;
  const { albedoTex, normalTex, roughnessTex } = mat.userData;
  if (albedoTex) albedoTex.dispose();
  if (normalTex) normalTex.dispose();
  if (roughnessTex) roughnessTex.dispose();
  mat.dispose();
}

let currentShellMat = null;
let currentPatioMat = null;

function applyShellMaterial() {
  const opt = getSelectedOption('section_pool_shell');
  if (!opt) return;

  const result = buildMaterial(opt, 512);
  if (result.type !== 'standard') return;

  if (currentShellMat) disposeMaterial(currentShellMat);
  currentShellMat = result.material;

  // Apply to floor and walls (indices 1-5)
  for (let i = 1; i < shellMeshes.length - 1; i++) {
    if (shellMeshes[i].material) {
      if (shellMeshes[i].material.userData) disposeMaterial(shellMeshes[i].material);
      shellMeshes[i].material = result.material;
    }
  }

  // Also apply to outer shell
  shellMeshes[0].material = result.material.clone();
}

function applyPatioMaterial() {
  const opt = getSelectedOption('section_patio_hardscape');
  if (!opt || !patioMeshes.deck) return;

  const result = buildMaterial(opt, 512);
  if (result.type !== 'standard') return;

  if (currentPatioMat) disposeMaterial(currentPatioMat);
  currentPatioMat = result.material;

  patioMeshes.deck.material = result.material;
}

function applyWaterProfile() {
  if (!waterMesh) return;
  const opt = getSelectedOption('section_water_profile');
  if (!opt) return;

  const wgt = opt.graphics_target;
  const u = waterMesh.userData.uniforms;
  if (!u) return;

  u.uColor.value.setHex(parseInt(wgt.color.hex.replace('#', ''), 16));
  u.uOpacity.value = wgt.transparency.opacity;
  u.uDistortionScale.value = wgt.water_animation.distortionScale;
  u.uWaveSpeed.value.set(wgt.water_animation.wave_speed_vector[0], wgt.water_animation.wave_speed_vector[1]);
  u.uWaveAmpA.value = wgt.water_animation.wave_amplitude_a;
  u.uWaveAmpB.value = wgt.water_animation.wave_amplitude_b;
  u.uWaveFreqA.value = wgt.water_animation.wave_frequency_a;
  u.uWaveFreqB.value = wgt.water_animation.wave_frequency_b;
  u.uWaveDirA.value.set(wgt.water_animation.wave_direction_a[0], wgt.water_animation.wave_direction_a[1]);
  u.uWaveDirB.value.set(wgt.water_animation.wave_direction_b[0], wgt.water_animation.wave_direction_b[1]);
  u.uChoppiness.value = wgt.water_animation.choppiness;
  u.uRoughness.value = wgt.pbr_properties.roughness;
}

// ============================================================
// UI RENDERING
// ============================================================
function renderUI() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  CONFIG.asset.sections.forEach(section => {
    const sectionEl = document.createElement('div');
    sectionEl.className = 'section';
    sectionEl.innerHTML = `
      <div class="section-header" data-section="${section.id}">
        <div style="display:flex;align-items:center"><span class="section-index">${section.index}</span><span class="section-title">${section.name}</span></div>
        <svg class="section-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="section-body" id="body-${section.id}"></div>
    `;
    container.appendChild(sectionEl);

    const bodyEl = sectionEl.querySelector('.section-body');
    section.options.forEach(opt => {
      const active = state.selections[section.id] === opt.id;
      const gt = opt.graphics_target;
      const card = document.createElement('div');
      card.className = `option-card${active ? ' active' : ''}`;
      card.setAttribute('data-option', opt.id);
      card.setAttribute('data-section', section.id);

      let priceStr = '';
      if (opt.pricing.method === 'LS') {
        priceStr = `${opt.pricing.base_cost.toLocaleString()}`;
        if (opt.pricing.base_cost === 0) priceStr = 'Included';
      } else if (opt.pricing.method === 'SF') {
        priceStr = `${opt.pricing.base_rate.toFixed(2)} / SF`;
      }

      card.innerHTML = `
        <div class="active-indicator"></div>
        <div class="option-header">
          <div class="color-swatch" style="background:${gt.color.hex};${gt.material_type==='ShaderMaterial'?'background:linear-gradient(135deg,'+gt.color.hex+' 0%,'+gt.color.hex+'88 100%);':''}"></div>
          <div class="option-info">
            <div class="option-name">${opt.name}</div>
            <div class="option-desc">${opt.description}</div>
            <div class="option-price">${priceStr} <span>${opt.pricing.method === 'LS' ? 'Base' : 'per SF'}</span></div>
          </div>
        </div>
      `;

      card.addEventListener('click', () => selectOption(section.id, opt.id));
      bodyEl.appendChild(card);
    });

    // Section collapse toggle
    sectionEl.querySelector('.section-header').addEventListener('click', () => {
      sectionEl.classList.toggle('collapsed');
    });
  });

  updateSummary();
}

function selectOption(sectionId, optionId) {
  if (state.selections[sectionId] === optionId) return;
  state.selections[sectionId] = optionId;

  // Apply material change
  if (sectionId === 'section_pool_shell') applyShellMaterial();
  if (sectionId === 'section_patio_hardscape') applyPatioMaterial();
  if (sectionId === 'section_water_profile') applyWaterProfile();

  // Update UI
  document.querySelectorAll(`.option-card[data-section="${sectionId}"]`).forEach(card => {
    card.classList.toggle('active', card.getAttribute('data-option') === optionId);
  });

  updateSummary();
}

function updateSummary() {
  const { total, lines } = calculateCost();

  const amountEl = document.getElementById('total-cost');
  amountEl.classList.add('updating');
  amountEl.textContent = total.toLocaleString();
  setTimeout(() => amountEl.classList.remove('updating'), 300);

  const detailsEl = document.getElementById('summary-details');
  detailsEl.innerHTML = lines.map(l => `
    <div class="summary-line"><span>${l.label}</span><span class="val">${l.cost.toLocaleString()}</span></div>
  `).join('');
}

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  controls.update();

  // Update water animation
  if (waterMesh && waterMesh.userData.uniforms) {
    waterMesh.userData.uniforms.uTime.value += dt;
    waterMesh.userData.uniforms.uCameraPos.value.copy(camera.position);
  }

  // Update env sphere time
  if (envSphere.material.uniforms) {
    envSphere.material.uniforms.uTime.value += dt;
  }

  renderer.render(scene, camera);
}

// ============================================================
// RESIZE HANDLER
// ============================================================
function onResize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / Math.max(h, 1);
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ============================================================
// INITIALIZATION
// ============================================================
function init() {
  renderUI();
  applyShellMaterial();
  applyPatioMaterial();
  applyWaterProfile();

  // Add dim badge
  document.getElementById('dim-badge').textContent =
    `${state.dims.pool_length}′ × ${state.dims.pool_width}′ × ${state.dims.pool_depth_avg}′`;

  // Hide loading screen
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 600);

  animate();
}

// Start
init();

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
window.addEventListener('keydown', (e) => {
  switch(e.key.toLowerCase()) {
    case 'r': controls.autoRotate = !controls.autoRotate; break;
    case 'f': controls.target.set(0, -1.5, 0); camera.position.set(18, 12, 22); controls.update(); break;
    case 't': camera.position.set(0, 20, 2); controls.target.set(0, -1, 0); controls.update(); break;
    case '1': selectOption('section_pool_shell', 'opt_concrete_shotcrete'); break;
    case '2': selectOption('section_pool_shell', 'opt_vinyl_liner'); break;
    case '3': selectOption('section_patio_hardscape', 'opt_concrete_pavers'); break;
    case '4': selectOption('section_patio_hardscape', 'opt_honed_travertine'); break;
    case '5': selectOption('section_water_profile', 'opt_water_caribbean_cyan'); break;
    case '6': selectOption('section_water_profile', 'opt_water_midnight_sapphire'); break;
  }
});

console.log('%c🏊 AquaForge %cLuxury Pool Configurator v2.3.1 %cready',
  'font-size:18px;font-weight:bold;color:#06b6d4;',
  'font-size:13px;color:#e8a850;',
  'font-size:11px;color:#606078;');
console.log('%cShortcuts: R=toggle rotate | F=reset view | T=top-down | 1-6=select options',
  'font-size:11px;color:#9898b0;');
</script>
